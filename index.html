<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación y Documentos</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="contenedor">
        <h1>Módulo: Postulación y Documentos</h1>
        <p>Complete el formulario y suba sus documentos.</p>

        <form action="#" method="POST" enctype="multipart/form-data">

            <fieldset>
                <legend>Datos Personales</legend>
                <div class="grupo-formulario">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="grupo-formulario">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Carga de Documentos</legend>

                <div class="grupo-formulario">
                    <label for="doc_identidad">
                        Documento de Identidad
                        <span class="ayuda" tabindex="0" data-ayuda="El PDF no debe pesar más de 2MB.">[?]</span>
                    </label>

                    <div class="zona-arrastrar">
                        <span class="texto-arrastrar">Arrastre el archivo aquí o haga clic</span>
                        <input type="file" id="doc_identidad" name="doc_identidad" accept=".pdf" class="entrada-archivo"
                            required>
                    </div>
                </div>

                <div class="grupo-formulario">
                    <label for="cert_notas">
                        Certificado de Notas
                        <span class="ayuda" tabindex="0"
                            data-ayuda="Debe ser el certificado del último periodo académico. Máximo 5MB.">[?]</span>
                    </label>

                    <div class="zona-arrastrar">
                        <span class="texto-arrastrar">Arrastre el archivo aquí o haga clic</span>
                        <input type="file" id="cert_notas" name="cert_notas" accept=".pdf" class="entrada-archivo"
                            required>
                    </div>
                </div>
            </fieldset>

            <div class="acciones-formulario">
                <button type="submit" class="boton-enviar">Enviar Postulación</button>
            </div>
        </form>
    </div>
</body>

</html>
